<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ゆうなぎ公園 — あるく、こしかける、なにもしない</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="screen" width="480" height="270"></canvas>

<div id="entrance">
  <h1>ゆうなぎ公園</h1>
  <p>ここには 通知も ニュースも タイムラインも ありません。<br>
     風の音を ききながら、西のはらっぱまで<br>
     ゆっくり 歩いてみてください。</p>
  <div class="controls">
    ← → で あるく ／ E で こしかける・ふれる<br>
    スマホは 画面の左右を おして あるく・中央をタップで ふれる
  </div>
  <button id="enter-btn">入園する</button>
</div>

<div id="hint"></div>

<div id="ui">
  <button data-mode="morning">朝</button>
  <button data-mode="day">昼</button>
  <button data-mode="dusk">夕</button>
  <button data-mode="night">夜</button>
  <button id="sound-btn">音</button>
</div>

<script src="js/palette.js"></script>
<script src="js/sprites.js"></script>
<script src="js/world.js"></script>
<script src="js/player.js"></script>
<script src="js/audio.js"></script>
<script src="js/main.js"></script>
</body>
</html>
