<title>ゆうなぎ公園 — あるく、こしかける、なにもしない</title>
<meta name="description" content="通知もニュースもタイムラインもない、ドット絵の小さな公園。歩いて、こしかけて、なにもしない時間をどうぞ。">
<meta property="og:title" content="ゆうなぎ公園">
<meta property="og:description" content="通知もニュースもタイムラインもない、ドット絵の小さな公園。歩いて、こしかけて、なにもしない時間をどうぞ。">
<meta property="og:type" content="website">
<meta property="og:image" content="https://sawara0806.github.io/yuunagi-park/og.png">
<meta property="og:url" content="https://sawara0806.github.io/yuunagi-park/">

<body>
<canvas id="screen" width="480" height="270"></canvas>

<div id="entrance">
  <h1>ゆうなぎ公園</h1>
  <p>ここには 通知も ニュースも タイムラインも ありません。<br>
     ちいさな 街かどの公園です。<br>
     木かげの ベンチまで、ゆっくり 歩いてみてください。</p>
  <div class="controls">
    ↑↓ で あるく ／ ←→ で よこあるき ／ クリックで マウス見まわしの ON・OFF<br>
    スマホは 左下のボタンで あるく・画面ドラッグで 見まわす<br>
    ベンチの ちかくで スペース ─ こしかける<br>
    M ─ 音の ON・OFF<br>
    かえるときは 南の門から どうぞ
  </div>
  <label id="sound-opt"><input type="checkbox" id="sound-check" checked> 風や鳥の音を ながす</label>
  <button id="enter-btn">入園する</button>
</div>

<div id="rotate">
  <div class="rotate-phone"></div>
  <p>よこ画面に して<br>ください</p>
</div>

<div id="hint"></div>

<div id="walkpad">
  <button id="walk-fwd" aria-label="すすむ">▲</button>
  <button id="walk-back" aria-label="さがる">▼</button>
</div>
<button id="sit-btn">すわる</button>

<script src="js/layout3d.js?v=20260715d"></script>
<script src="js/assets3d.js?v=20260715d"></script>
<script src="js/render3d.js?v=20260715d"></script>
<script src="js/audio3d.js?v=20260715d"></script>
<script src="js/park3d.js?v=20260715d"></script>
</body>
</html>
